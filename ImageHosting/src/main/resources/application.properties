spring.application.name=ImageHosting
#MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/learnSpring
spring.datasource.username=LearnSpring
spring.datasource.password=springboot123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.format_sql=true

#Redis
spring.redis.host = localhost
spring.redis.port=6379
spring.redis.password=password

#SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

#  A W S
# S3
cloud.aws.credentials.access-key=
cloud.aws.credentials.secret-key=
cloud.aws.region.static=
cloud.aws.stack.auto =false
app.s3.bucket =


# File Upload Configuration
app.s3.allowed.extensions=.pdf,.jpg,.jpeg,.png,.gif,.txt,.doc,.docx,.xls,.xlsx,.zip,.no-extension
app.s3.max.file.size=10485760
app.s3.max.download.in.memory=5242880

# Multipart Upload Configuration
app.s3.multipart.threshold=1
app.s3.thread.pool.size=5

# Server Configuration
server.port=8080
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true

# Elasticsearch Configuration
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.connection-timeout=10s
spring.elasticsearch.socket-timeout=30s

# Optional: If using authentication
spring.elasticsearch.username=elastic
spring.elasticsearch.password=your-password
spring.data.elasticsearch.repositories.enabled=true


server {
    listen 80;
    server_name 35.154.17.52.sslip.io;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: forward /api, /oauth2, /login to Spring Boot backend
    location ~* ^/(api|oauth2|login)/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE (Server-Sent Events) to stream properly
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }

    # React Router: all other paths serve index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Performance: cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}


services:
  mysql:
    image: mysql:8.0
    container_name: m-interest-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-LearnSpring}
      MYSQL_USER: ${MYSQL_USER:-LearnSpring}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-springboot123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - m-interest-network

  redis:
    image: redis:7.0-alpine
    container_name: m-interest-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "6379:6379"
    networks:
      - m-interest-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: m-interest-es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - m-interest-network

  backend:
    build:
      context: ./ImageHosting
      dockerfile: Dockerfile
    container_name: m-interest-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-LearnSpring}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-LearnSpring}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-springboot123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      FRONTEND_URL: https://35.154.17.52.sslip.io
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - elasticsearch
    networks:
      - m-interest-network
    restart: on-failure

  frontend:
    build:
      context: ./Janaka/janaka
      dockerfile: Dockerfile
    container_name: m-interest-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - m-interest-network

networks:
  m-interest-network:
    driver: bridge

volumes:
  mysql-data:
